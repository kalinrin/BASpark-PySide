name: Build BASpark-PySide

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: BASpark-windows-64
            mac_arch: x86_64
          - os: macos-26-intel
            artifact_name: BASpark-macos-64
            mac_arch: x86_64
            deployment_target: "15.0"
          - os: macos-26
            artifact_name: BASpark-macos-arm64
            mac_arch: arm64
            deployment_target: "15.0"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka zstandard imageio

      - name: Unlink Homebrew OpenSSL to avoid bundling host paths (macOS Intel)
        if: matrix.os == 'macos-26-intel'
        run: brew unlink openssl@3 || true

      - name: Build Windows
        if: runner.os == 'Windows'
        run: >
          python -m nuitka --onefile
          --windows-console-mode=disable
          --windows-uac-admin
          --assume-yes-for-downloads
          --output-dir=dist
          --output-filename=BASpark
          --enable-plugin=pyside6
          --noinclude-qt-translations
          --include-data-dir=web=web
          --include-data-files=app.ico=app.ico
          --windows-icon-from-ico=app.ico
          --python-flag=no_asserts
          --python-flag=no_docstrings
          --lto=yes
          --nofollow-import-to=PySide6.Qt3DCore
          --nofollow-import-to=PySide6.Qt3DRender
          --nofollow-import-to=PySide6.QtQml
          --nofollow-import-to=PySide6.QtQuick
          --nofollow-import-to=PySide6.QtSql
          --nofollow-import-to=PySide6.QtSensors
          --nofollow-import-to=PySide6.QtBluetooth
          --nofollow-import-to=PySide6.QtNfc
          --nofollow-import-to=PySide6.QtMultimedia
          --nofollow-import-to=PySide6.QtMultimediaWidgets
          --nofollow-import-to=PySide6.QtPositioning
          --nofollow-import-to=PySide6.QtTest
          --nofollow-import-to=PySide6.QtXml
          main.py

      - name: Prepare Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "dist/main.exe") { Rename-Item "dist/main.exe" "BASpark.exe" }
          if (Test-Path "dist/BASpark.exe") { Move-Item "dist/BASpark.exe" "./BASpark.exe" }

      - name: Build macOS
        if: runner.os == 'macOS'
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
        run: >
          python -m nuitka --standalone
          --macos-create-app-bundle
          --macos-app-name=BASpark
          --macos-app-mode=gui
          --macos-target-arch=${{ matrix.mac_arch }}
          --assume-yes-for-downloads
          --output-dir=dist
          --enable-plugin=pyside6
          --noinclude-qt-translations
          --include-data-dir=web=web
          --include-data-files=app.ico=app.ico
          --macos-app-icon=app.icns
          --python-flag=no_asserts
          --python-flag=no_docstrings
          --lto=yes
          --nofollow-import-to=PySide6.Qt3DCore
          --nofollow-import-to=PySide6.Qt3DRender
          --nofollow-import-to=PySide6.QtQml
          --nofollow-import-to=PySide6.QtQuick
          --nofollow-import-to=PySide6.QtSql
          --nofollow-import-to=PySide6.QtSensors
          --nofollow-import-to=PySide6.QtBluetooth
          --nofollow-import-to=PySide6.QtNfc
          --nofollow-import-to=PySide6.QtMultimedia
          --nofollow-import-to=PySide6.QtMultimediaWidgets
          --nofollow-import-to=PySide6.QtPositioning
          --nofollow-import-to=PySide6.QtTest
          --nofollow-import-to=PySide6.QtXml
          main.py

      - name: Verify minimum macOS version
        if: runner.os == 'macOS'
        run: |
          cd dist
          if [ -d "main.app" ]; then
            APP_DIR="main.app/Contents"
            echo "==== Highest minos across all bundled binaries ===="
            find "$APP_DIR" -type f \( -name "*.dylib" -o -name "*.so" -o -name "Python" \) -print0 | \
            while IFS= read -r -d '' f; do
              v=$(otool -l "$f" 2>/dev/null | awk '/LC_VERSION_MIN_MACOSX/{f=1} /LC_BUILD_VERSION/{f=1} f&&/minos|version/{print $2; f=0}')
              echo "$v  $f"
            done | sort -rn | head -20
          fi

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          cd dist
          if [ -d "main.app" ]; then mv main.app BASpark.app; fi
          zip -ry ../${{ matrix.artifact_name }}.zip BASpark.app

      - name: Upload Windows Artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: "BASpark.exe"

      - name: Upload macOS Artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: "*.zip"